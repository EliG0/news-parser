<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Crawler</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .dashboard-card {
            background: black;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; margin-bottom: 30px; }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-parse {
            background-color: #3498db;
            color: white;
        }
        .btn-parse:hover { background-color: #2980b9; }

        .btn-admin {
            background-color: #2ecc71;
            color: white;
        }
        .btn-admin:hover { background-color: #27ae60; }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        {% if messages %}
            {% for message in messages %}
                <div class="alert-success">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %} <button type="submit" class="btn btn-parse">▶️ Parse</button>
        </form>

        <a href="/admin/" class="btn btn-admin" target="_blank">⚙️ Go to admin</a>
    </div>

</body>
</html>
